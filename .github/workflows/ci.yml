name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install, build, and validate site
        uses: withastro/action@v5
        with:
          path: .
          node-version: 22
          package-manager: npm
